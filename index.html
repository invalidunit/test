<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>testt</title>
  
  <!-- 推荐使用 Vue 主题（清晰简洁） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  
  <style>
    body {
      font-family: "Microsoft YaHei", system-ui, -apple-system, sans-serif;
    }
    .markdown-section pre {
      background: #f8f8f8;
      border-radius: 8px;
    }
    .markdown-section code {
      font-size: 0.92em;
      font-family: "Consolas", "Courier New", monospace;
    }
    .dark .markdown-section pre {
      background: #2d2d2d;
    }
    h2, h3 {
      margin-top: 2em;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'test',
      repo: 'invalidunit/test',   // 改成你自己的仓库
      loadSidebar: true,
      subMaxLevel: 3,
      coverpage: false,
      
      // 搜索配置
      search: {
        paths: 'auto',
        placeholder: '搜索命令或关键词...',
        noData: '没有找到相关结果',
        depth: 6
      },

      // 代码复制按钮
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制！'
      },

      // 自动生成目录
      auto2top: true,
      
      // 其他常用配置
      themeColor: '#42b983',
      homepage: 'README.md'
    }
  </script>

  <!-- 核心脚本 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- 插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
